<svg width="100%" viewBox="0 0 680 370" role="img" xmlns="http://www.w3.org/2000/svg">
<title>LazyClaude architecture diagram</title>
<desc>LazyClaude agent harness: Hephaestus executor, Oracle verifier, Explorer mapper in a verified loop. Bundled with insane-search WAF bypass engine Phase 0 through 3.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<style>
  text { font-family: ui-sans-serif, system-ui, sans-serif; fill: #1a1a1a; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; fill: #555; }
  .box-purple rect { fill: #EEEDFE; stroke: #534AB7; }
